services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hay-postgres
    restart: unless-stopped
    # Needed by pgvector HNSW index builds: high maintenance_work_mem causes
    # Postgres to allocate dynamic shared-memory segments that exceed Docker's
    # 64 MB default for /dev/shm. Production DO Postgres is unaffected.
    shm_size: 2gb
    environment:
      POSTGRES_USER: hay
      POSTGRES_PASSWORD: hay_password
      POSTGRES_DB: hay_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Auto-create pgvector extension on first run
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hay -d hay_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: hay-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: hay
      RABBITMQ_DEFAULT_PASS: hay_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
