name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast static checks — no database or services required. These are the cheap,
  # high-signal gates that should pass before any PR merges.
  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck

  # Server unit + integration tests (Jest). Postgres (pgvector) and Redis are
  # provisioned as services; integration tests run real queries against them.
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: hay
          POSTGRES_PASSWORD: hay_password
          POSTGRES_DB: hay_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hay -d hay_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: hay
      DB_PASSWORD: hay_password
      DB_NAME: hay_db
      DB_SSL: "false"
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      JWT_SECRET: ci-test-secret-not-for-production-use-00000
      JWT_REFRESH_SECRET: ci-test-refresh-secret-not-for-production-00
      OPENAI_API_KEY: sk-fake-key-for-ci-tests
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run database migrations
        run: cd server && npm run migration:run
      - name: Run server tests
        run: cd server && npm test
